<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Sanxing English Village Interactive Whiteboard</title>

    <link rel="preload" href="https://raw.githubusercontent.com/teachercristw/crisboard/main/1.jpg" as="image">
    <link rel="preload" href="https://raw.githubusercontent.com/teachercristw/crisboard/main/2.jpg" as="image">
    <link rel="preload" href="https://raw.githubusercontent.com/teachercristw/crisboard/main/3.jpg" as="image">
    <link rel="preload" href="https://raw.githubusercontent.com/teachercristw/crisboard/main/4.jpg" as="image">

    <style>
        /* ==========================================
           1. GLOBAL AESTHETICS & CONSTRAINTS
           ========================================== */
        :root { --bg: #0F0C29; --c1: #302B63; --c2: #F5AF19; --c3: #24243E; --c4: #F10086; --text: #FFFFFF; --shadow: 0 8px 20px rgba(0,0,0,0.3); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Century Gothic', sans-serif; font-weight: bold; background-color: var(--bg); overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; color: var(--text); transition: background-color 0.5s, background-image 0.5s; background-repeat: no-repeat; }
        * { box-sizing: border-box; }
        button, select, input, textarea { font-family: 'Century Gothic', sans-serif; font-weight: bold; }
        button { cursor: pointer; border: 4px solid #FFF; border-radius: 15px; background: #FFF; padding: 10px 20px; font-size: 1.1rem; color: #2D3436; box-shadow: 0 5px 0 rgba(0,0,0,0.1); transition: transform 0.1s; text-transform: uppercase; }
        button:active { transform: translateY(5px); box-shadow: 0 0px 0 rgba(0,0,0,0.1); }
        
        select, input, textarea { 
            padding: 10px; border-radius: 10px; border: 3px solid #EEE; font-size: 1rem; width: 100%; margin-bottom: 10px; background: #FAFAFA; color: #333;
            user-select: auto !important; -webkit-user-select: auto !important; -moz-user-select: auto !important; -ms-user-select: auto !important; -webkit-touch-callout: default !important; touch-action: auto !important; cursor: text !important; pointer-events: auto !important;
        }
        
        /* ==========================================
           2. SCREENS & MAIN UI
           ========================================== */
        @keyframes gradientShift { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        #start-screen { position: absolute; inset: 0; background: linear-gradient(-45deg, #FFB6B9, #FFE082, #C8E3D4, #D1C4E9, #F10086, #F5AF19); background-size: 400% 400%; animation: gradientShift 12s ease infinite; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; overflow: hidden; transition: opacity 0.5s ease;}
        #start-screen h1 { text-align: center; z-index: 2; line-height: 1.1; margin-bottom: 40px; }
        .title-main { font-size: 6rem; background: linear-gradient(to right, #FFF, #FFE082); -webkit-background-clip: text; color: transparent; filter: drop-shadow(0 6px 4px rgba(0,0,0,0.2)); display: block; animation: bounce 2s infinite ease-in-out alternate;}
        .title-sub { font-size: 3.5rem; color: #FFF; text-shadow: 0 4px 0 rgba(0,0,0,0.2); display: block; margin-top: 10px;}
        .title-author { font-size: 2rem; color: #2D3436; text-shadow: 0 2px 0 rgba(255,255,255,0.5); display: block; margin-top: 20px; background: rgba(255,255,255,0.7); padding: 5px 20px; border-radius: 20px; display: inline-block;}
        #start-btn { font-size: 3.5rem; background: var(--c4); padding: 20px 70px; border-radius: 50px; color: #FFF; border: 8px solid #FFF; z-index: 2; animation: pulse 1.5s infinite;}
        
        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }
        @keyframes bounce { 0% {transform: translateY(0);} 100% {transform: translateY(-10px);} }
        @keyframes floatUp { 0% {transform: translateY(110vh) rotate(0deg); opacity: 0.8;} 100% {transform: translateY(-10vh) rotate(360deg); opacity: 0;} }
        .bubble { position: absolute; background: rgba(255,255,255,0.3); border-radius: 50%; z-index: 1; pointer-events: none; }

        #app-bg-img { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; display: none; }
        #app { display: none; width: 100%; height: 100%; position: relative; }

        /* Floating App Buttons */
        #fs-global-btn { position: absolute; top: 20px; left: 20px; z-index: 3000; width: 60px; height: 60px; font-size: 1.8rem; border-radius: 50%; padding: 0; display: flex; justify-content: center; align-items: center; background: #FFF; color: var(--c3); border: 4px solid var(--c3); box-shadow: var(--shadow); transition: transform 0.2s;}
        #anno-global-btn { position: absolute; bottom: 20px; left: 90px; z-index: 3000; width: 60px; height: 60px; font-size: 1.8rem; border-radius: 50%; padding: 0; display: flex; justify-content: center; align-items: center; background: #FFF; color: var(--c4); border: 4px solid var(--c2); box-shadow: var(--shadow); transition: transform 0.2s;}
        
        #theme-btn { position: absolute; top: 90px; right: 20px; z-index: 3000; width: 60px; height: 60px; font-size: 1.8rem; border-radius: 50%; padding: 0; display: flex; justify-content: center; align-items: center; background: var(--c4); transition: transform 0.4s ease-in-out; }
        
        #home-btn { position: absolute; bottom: 20px; right: 20px; z-index: 3000; width: 60px; height: 60px; font-size: 1.8rem; border-radius: 50%; padding: 0; display: flex; justify-content: center; align-items: center; background: #FFF; color: var(--c4); border: 4px solid var(--c4); box-shadow: var(--shadow); transition: transform 0.4s ease-in-out;}
        #focus-btn { position: absolute; bottom: 20px; left: 20px; z-index: 3000; width: 60px; height: 60px; font-size: 1.8rem; border-radius: 50%; padding: 0; display: flex; justify-content: center; align-items: center; background: #FFF; color: var(--c4); border: 4px solid var(--c1); box-shadow: var(--shadow); transition: transform 0.2s;}

        /* Toolbars & Focus Mode Animations */
        #right-sidebar { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 2000; transition: transform 0.4s ease-in-out; }
        .side-btn { width: 60px; height: 60px; font-size: 1.5rem; border-radius: 50%; padding: 0; display: flex; justify-content: center; align-items: center; }
        
        #bottom-bar { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-wrap: nowrap; gap: 8px; z-index: 2000; background: rgba(255,255,255,0.2); padding: 10px 15px; border-radius: 40px; backdrop-filter: blur(10px); transition: transform 0.4s ease-in-out; max-width: 98vw; overflow-x: auto; align-items: center; justify-content: center; }
        .bottom-btn { background: #FFF; font-size: clamp(0.75rem, 1.2vw, 1.1rem); padding: 10px 15px; border-radius: 30px; text-transform: uppercase; color: #2D3436; white-space: nowrap; flex-shrink: 1; }

        body.ui-hidden #bottom-bar { transform: translate(-50%, 150px); }
        body.ui-hidden #right-sidebar { transform: translate(150px, -50%); }
        body.ui-hidden #theme-btn { transform: translateX(150px); }
        body.ui-hidden #anno-global-btn { transform: translateY(150px); }
        body.ui-hidden #home-btn { transform: translateX(150px); }

        /* ==========================================
           3. WIDGETS
           ========================================== */
        .widget { position: absolute; top: 50px; left: 50px; background: rgba(255,255,255,0.95); border: 6px solid #FFF; border-radius: 20px; box-shadow: var(--shadow); z-index: 100; display: none; flex-direction: column; min-width: 350px; min-height: 250px; resize: both; overflow: hidden; color: #2D3436; }
        .widget-header { background: var(--c2); padding: 15px 20px; font-size: 1.2rem; cursor: grab; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; color: #2D3436;}
        .widget-close { background: var(--c4); color: white; width: 30px; height: 30px; border-radius: 50%; font-size: 1rem; padding: 0; border: 2px solid #FFF;}
        .widget-content { padding: 15px; flex: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; min-height: 0;}

        .wb-tool-row { display: flex; gap: 8px; align-items: center; background: #EEE; padding: 8px; border-radius: 10px; margin-bottom: 10px; flex-wrap: wrap;}
        .wb-color-btn { width: 25px; height: 25px; border: 3px solid #FFF; border-radius: 50%; cursor: pointer; box-shadow: 0 3px 0 rgba(0,0,0,0.1); }
        .wb-color-btn.active { transform: scale(1.2); border-color: #2D3436; }
        .wb-tool-btn { padding: 5px 8px; font-size: 1rem; background: #FFF; text-transform: none; border: 3px solid transparent;}
        .wb-tool-btn.active { border-color: var(--c4); background: var(--c2);}
        #wb-canvas-container { position: relative; flex: 1; border: 4px solid #DDD; border-radius: 10px; overflow: hidden; background: #FFF; touch-action: none;}
        #whiteboard { position: absolute; inset: 0; z-index: 1; cursor: crosshair; touch-action: none; }

        .time-input { width: 90px; font-size: 5rem; text-align: center; border: none; background: transparent; color: var(--c4); font-family: inherit; font-weight: bold; outline: none; padding: 0; margin-bottom: 10px;}
        .time-input:disabled { background: transparent; color: var(--c4); opacity: 1; -webkit-text-fill-color: var(--c4);}

        #score-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; padding: 5px;}
        .score-card { background: var(--c3); padding: 15px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: space-between; border: 4px solid #FFF; position: relative; overflow: hidden;}
        .score-card input { position: relative; z-index: 20; color: #FFF; text-shadow: 0 2px 0 rgba(0,0,0,0.3); text-align: center; border: none; background: transparent; font-size: 1.4rem; font-family: inherit; font-weight: bold; width: 100%; outline: none; padding: 0;}
        .card-del { position: absolute; top: -10px; right: -10px; background: var(--c1); color: #FFF; border-radius: 50%; width: 30px; height: 30px; padding: 0; font-size: 1rem; border: 2px solid #FFF; z-index: 25;}
        
        .burger-stack { display: flex; flex-direction: column-reverse; align-items: center; min-height: 120px; justify-content: flex-start; margin: 10px 0; width: 100%;}
        .ing { width: 80px; height: 15px; border-radius: 10px; margin-bottom: -5px; box-shadow: 0 3px 5px rgba(0,0,0,0.4); animation: dropIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; border: 2px solid rgba(0,0,0,0.15); z-index: 1;}
        @keyframes dropIn { 0% { transform: translateY(-40px) scale(0); opacity: 0; } 100% { transform: translateY(0) scale(1); opacity: 1; } }

        .picker-tab-btn { background: var(--c2); color: #FFF; flex: 1; padding: 10px; font-size: 1.1rem; border: none; border-radius: 10px;}
        .picker-tab-btn.active { background: var(--c4); }
        .group-result-box { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-top: 15px; width: 100%;}
        .grp-col { background: #EEE; border-radius: 10px; padding: 10px; text-align: center; border: 3px solid #DDD;}
        .grp-item { background: #FFF; padding: 5px; border-radius: 5px; margin-bottom: 5px; font-size: 1rem; color: #333; box-shadow: 0 2px 0 rgba(0,0,0,0.1);}

        .tab-nav { display: flex; gap: 10px; margin-bottom: 15px; justify-content: center; flex-wrap: wrap;}
        .tab-content { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; }
        .tab-content.active { display: flex; }
        .dd-zone { min-width: 180px; min-height: 90px; border: 6px dashed var(--c4); border-radius: 20px; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.05); margin: 0 10px; flex-direction: column; transition: all 0.2s;}
        .dd-item { font-size: 2.5rem; cursor: grab; padding: 10px 20px; background: #FFF; border: 4px solid #EEE; border-radius: 15px; box-shadow: 0 4px 0 rgba(0,0,0,0.1); touch-action: none; z-index: 3500; text-align: center; display: flex; flex-direction: column; align-items: center; line-height: 1.2;}
        .dd-clone { position: fixed; z-index: 5000; pointer-events: none; opacity: 0.9; box-shadow: 0 15px 30px rgba(0,0,0,0.3); transform: scale(1.1); }

        .iframe-wrapper { position: relative; flex: 1; width: 100%; min-height: 0; border: 4px solid #DDD; border-radius: 15px; overflow: hidden; background: #EEE; transition: all 0.3s ease; }
        .iframe-container { position: absolute; top: 0; left: 0; border: none; transform-origin: top left; }
        .pseudo-fullscreen { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; z-index: 9999 !important; border: none !important; background: #000; }
        
        #dashboard-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(5px);}
        .dash-content { background: #FFF; padding: 30px; border-radius: 20px; width: 90%; max-width: 900px; max-height: 90vh; overflow-y: auto; color: #2D3436; border: 6px solid var(--c1);}
        .dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .dash-section { margin-bottom: 15px; background: #F9F9F9; padding: 15px; border-radius: 15px; border: 3px solid #EEE; }
        .list-item { display: flex; justify-content: space-between; align-items: center; background: #FFF; padding: 10px; border-radius: 10px; margin-bottom: 5px; border: 2px solid #EEE;}
    </style>
</head>
<body>

    <canvas id="anno-canvas"></canvas>
    <canvas id="anno-draft"></canvas>
    <div id="anno-toolbar">
        <div class="drag-handle">⠿ DRAG ⠿</div>
        <button onclick="clearAnno()" style="background:var(--c4); color:#FFF; border:none; padding:5px 15px;">🗑️ Clear Ink</button>
        <button onclick="toggleAnnotation()">✖ Done</button>
    </div>

    <div id="start-screen">
        <div id="bubble-container"></div>
        <h1 style="line-height: 1.2; text-align: center;">
            <span class="title-main">Sanxing English Village</span><br>
            <span class="title-sub">Interactive Whiteboard</span><br>
            <span class="title-author">by Teacher Cris Saranza</span>
        </h1>
        <button id="start-btn" onclick="startGame()">Start Class</button>
    </div>

    <div id="app">
        <button id="fs-global-btn" onclick="toggleGlobalFullscreen()">🖵</button>
        <button id="anno-global-btn" onclick="toggleAnnotation()">🖍️</button>
        <button id="theme-btn" onclick="toggleW('w-theme')">🎨</button>
        <button id="home-btn" onclick="goHome()">🏠</button>
        <button id="focus-btn" onclick="toggleUI()">👁️</button>

        <div id="right-sidebar">
            <button class="side-btn" onclick="toggleW('w-whiteboard')">📝</button>
            <button class="side-btn" onclick="toggleW('w-timer')">⏳</button>
            <button class="side-btn" onclick="toggleW('w-score')">🍔</button>
            <button class="side-btn" onclick="toggleW('w-picker')">🎯</button>
        </div>

        <div id="bottom-bar">
            <button class="bottom-btn" onclick="toggleW('w-greetings')">☀️ Greetings</button>
            <button class="bottom-btn" onclick="toggleW('w-learning')">📚 Learning</button>
            <button class="bottom-btn" onclick="toggleW('w-activities')">🕹️ Fun Activities</button>
            <button class="bottom-btn" onclick="openDashboard()">⚙️ Settings</button>
        </div>

        <div class="widget" id="w-whiteboard" style="width: 700px; height: 500px;">
            <div class="widget-header"><span>📝 Whiteboard</span><button class="widget-close" onclick="toggleW('w-whiteboard')">X</button></div>
            <div class="widget-content">
                <div id="wb-canvas-container" style="flex:1;">
                    <canvas id="whiteboard"></canvas>
                </div>
            </div>
        </div>
        <!-- (Other widgets remain in your original structure) -->
    </div>

    <script>
        // --- AUTO-FETCH JSON DATA ---
        async function autoFetchConfig() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/teachercristw/crisboard/refs/heads/main/crisboard.json?t=' + new Date().getTime());
                if (response.ok) {
                    const data = await response.json();
                    if (data && data.classes) {
                        state = data;
                        applyCoreSettings();
                        updateClassDropdowns();
                    }
                }
            } catch (error) { console.error("Could not fetch:", error); }
        }

        // --- UNIVERSAL TOUCH & MOUSE HANDLERS ---
        function getPointerPos(e) {
            // This detects if the input is from a touch or a mouse
            const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
            const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
            const rect = e.target.getBoundingClientRect();
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        // Whiteboard Logic
        const cvs = document.getElementById('whiteboard');
        const ctx = cvs.getContext('2d');
        let isDrawing = false;

        function startDrawing(e) { isDrawing = true; const pos = getPointerPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
        function draw(e) { 
            if(!isDrawing) return; 
            e.preventDefault(); 
            const pos = getPointerPos(e); 
            ctx.lineTo(pos.x, pos.y); 
            ctx.stroke(); 
        }
        function stopDrawing() { isDrawing = false; }

        // Use 'pointer' events for both mouse and touch (works on smartboards)
        cvs.addEventListener('pointerdown', startDrawing);
        cvs.addEventListener('pointermove', draw);
        window.addEventListener('pointerup', stopDrawing);

        // --- INITIALIZATION ---
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            resizeCvs();
        }

        function resizeCvs() {
            const cont = document.getElementById('wb-canvas-container');
            cvs.width = cont.clientWidth;
            cvs.height = cont.clientHeight;
            ctx.strokeStyle = '#2D3436';
            ctx.lineWidth = 8;
            ctx.lineCap = 'round';
        }

        window.onload = () => { autoFetchConfig(); resizeCvs(); };
    </script>
</body>
</html>
