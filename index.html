<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Sanxing English Village Interactive Whiteboard</title>

    <link rel="preload" href="https://raw.githubusercontent.com/teachercristw/crisboard/main/1.jpg" as="image">
    <link rel="preload" href="https://raw.githubusercontent.com/teachercristw/crisboard/main/2.jpg" as="image">
    <link rel="preload" href="https://raw.githubusercontent.com/teachercristw/crisboard/main/3.jpg" as="image">
    <link rel="preload" href="https://raw.githubusercontent.com/teachercristw/crisboard/main/4.jpg" as="image">

    <style>
        :root { --bg: #0F0C29; --c1: #302B63; --c2: #F5AF19; --c3: #24243E; --c4: #F10086; --text: #FFFFFF; --shadow: 0 8px 20px rgba(0,0,0,0.3); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Century Gothic', sans-serif; font-weight: bold; background-color: var(--bg); overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; color: var(--text); transition: background-color 0.5s, background-image 0.5s; background-repeat: no-repeat; }
        * { box-sizing: border-box; }
        button { cursor: pointer; border: 4px solid #FFF; border-radius: 15px; background: #FFF; padding: 10px 20px; font-size: 1.1rem; color: #2D3436; box-shadow: 0 5px 0 rgba(0,0,0,0.1); transition: transform 0.1s; text-transform: uppercase; touch-action: manipulation; }
        button:active { transform: translateY(5px); box-shadow: 0 0px 0 rgba(0,0,0,0.1); }
        select, input, textarea { padding: 10px; border-radius: 10px; border: 3px solid #EEE; font-size: 1rem; width: 100%; margin-bottom: 10px; background: #FAFAFA; color: #333; user-select: auto !important; touch-action: auto !important; cursor: text !important; pointer-events: auto !important; }
        
        @keyframes gradientShift { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }
        #start-screen { position: absolute; inset: 0; background: linear-gradient(-45deg, #FFB6B9, #FFE082, #C8E3D4, #D1C4E9, #F10086, #F5AF19); background-size: 400% 400%; animation: gradientShift 12s ease infinite; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; transition: opacity 0.5s ease;}
        .title-main { font-size: 6rem; background: linear-gradient(to right, #FFF, #FFE082); -webkit-background-clip: text; color: transparent; display: block; animation: bounce 2s infinite ease-in-out alternate;}
        #start-btn { font-size: 3.5rem; background: var(--c4); padding: 20px 70px; border-radius: 50px; color: #FFF; border: 8px solid #FFF; animation: pulse 1.5s infinite;}
        
        #app { display: none; width: 100%; height: 100%; position: relative; }
        .widget { position: absolute; background: rgba(255,255,255,0.95); border: 6px solid #FFF; border-radius: 20px; box-shadow: var(--shadow); z-index: 100; display: none; flex-direction: column; resize: both; overflow: hidden; color: #2D3436; touch-action: none; }
        .widget-header { background: var(--c2); padding: 15px 20px; font-size: 1.2rem; cursor: grab; display: flex; justify-content: space-between; align-items: center; text-transform: uppercase; color: #2D3436;}
        .widget-content { padding: 15px; flex: 1; display: flex; flex-direction: column; overflow-y: auto; touch-action: auto;}
        
        #wb-canvas-container { position: relative; flex: 1; border: 4px solid #DDD; border-radius: 10px; background: #FFF; touch-action: none; }
        #whiteboard { position: absolute; inset: 0; cursor: crosshair; touch-action: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 style="text-align: center;">
            <span class="title-main">Sanxing English Village</span><br>
            <span style="font-size: 3rem; color: #FFF;">Interactive Whiteboard</span>
        </h1>
        <button id="start-btn" onclick="startGame()">Start Class</button>
    </div>

    <div id="app">
        <!-- Floating Buttons -->
        <button id="anno-global-btn" style="position:absolute; bottom:20px; left:20px; z-index:3000;" onclick="toggleAnnotation()">🖍️</button>
        <button id="home-btn" style="position:absolute; bottom:20px; right:20px; z-index:3000;" onclick="goHome()">🏠</button>

        <div class="widget" id="w-whiteboard" style="width: 700px; height: 500px; top: 50px; left: 50px; display: flex;">
            <div class="widget-header"><span>📝 Whiteboard</span><button class="widget-close" onclick="toggleW('w-whiteboard')">X</button></div>
            <div class="widget-content">
                <div id="wb-canvas-container">
                    <canvas id="whiteboard"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- AUTO-FETCH CONFIG ---
        async function autoFetchConfig() {
            try {
                const response = await fetch('https://raw.githubusercontent.com/teachercristw/crisboard/refs/heads/main/crisboard.json?t=' + new Date().getTime());
                if (response.ok) {
                    const data = await response.json();
                    if (data) state = data;
                }
            } catch (error) { console.error("Fetch failed", error); }
        }

        // --- WHITEBOARD TOUCH & MOUSE LOGIC ---
        const cvs = document.getElementById('whiteboard');
        const ctx = cvs.getContext('2d');
        let isD = false;

        function getPos(e) {
            const r = cvs.getBoundingClientRect();
            // Works for both Mouse and Touch (Pointer events)
            return { x: e.clientX - r.left, y: e.clientY - r.top };
        }

        function sD(e) { isD = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }
        function eD() { isD = false; }
        function dD(e) {
            if(!isD) return;
            const p = getPos(e);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
        }

        // Universal Pointer Listeners
        cvs.addEventListener('pointerdown', sD);
        window.addEventListener('pointerup', eD);
        cvs.addEventListener('pointermove', dD);

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            resizeCvs();
        }

        function resizeCvs() {
            const container = document.getElementById('wb-canvas-container');
            cvs.width = container.clientWidth;
            cvs.height = container.clientHeight;
            ctx.strokeStyle = '#2D3436';
            ctx.lineWidth = 5;
            ctx.lineCap = 'round';
        }

        window.onload = () => { autoFetchConfig(); };
    </script>
</body>
</html>
